name: Run checks

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Guard against the staging-only PASSKEY_SYNC_ENABLED flip reaching main
  # (e.g. via a staging→main merge or cherry-pick). The flip is committed
  # directly on the staging branch and must never merge back; production
  # launch of vault sync is a deliberate main-side change that also updates
  # this guard.
  flag-guard:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: PASSKEY_SYNC_ENABLED must be false on main 🚫
        run: |
          if ! grep -q "export const PASSKEY_SYNC_ENABLED = false" src/lib/passkeySync.ts; then
            echo "::error file=src/lib/passkeySync.ts::PASSKEY_SYNC_ENABLED is not false."
            echo "The staging-only flag flip must never reach main. If this is the"
            echo "deliberate production launch of passkey vault sync, update this guard"
            echo "in the same PR."
            exit 1
          fi

      - name: PASSKEY_SIGNUP_ENABLED must be false on main 🚫
        run: |
          if ! grep -q "export const PASSKEY_SIGNUP_ENABLED = false" src/lib/passkeySync.ts; then
            echo "::error file=src/lib/passkeySync.ts::PASSKEY_SIGNUP_ENABLED is not false."
            echo "Launch flips SIGNUP and SYNC together in one deliberate PR that"
            echo "updates this guard (R3 ruling). A stray flip must not reach main."
            exit 1
          fi

      - name: NOTE_REVIEW_POST_ENABLED must be false on main 🚫
        run: |
          if ! grep -q "export const NOTE_REVIEW_POST_ENABLED = false" src/lib/noteReview.ts; then
            echo "::error file=src/lib/noteReview.ts::NOTE_REVIEW_POST_ENABLED is not false."
            echo "The Post button ships dark until Phase 3 wires postComment()."
            echo "Flip it in the Phase 3 PR that adds the publish path AND updates"
            echo "this guard — a stray flip must not reach main."
            exit 1
          fi

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup Node.js 🟢
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enable Corepack (pnpm) 🎯
        run: |
          corepack enable
          pnpm --version

      - name: Get pnpm store directory 📂
        run: echo "PNPM_STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_ENV"

      - name: Use cache for pnpm 🎁
        uses: actions/cache@v4
        with:
          path: ${{ env.PNPM_STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install pnpm packages 📦
        run: |
          pnpm install --frozen-lockfile

      # Soft-fail: repo-wide formatting/eslint debt (563 prettier files, ~17k eslint errors).
      # Tracked for cleanup — flip to enforcing once formatting debt is paid.
      - name: Lint 🧹
        continue-on-error: true
        run: pnpm lint

  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup Node.js 🟢
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enable Corepack (pnpm) 🎯
        run: |
          corepack enable
          pnpm --version

      - name: Get pnpm store directory 📂
        run: echo "PNPM_STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_ENV"

      - name: Use cache for pnpm 🎁
        uses: actions/cache@v4
        with:
          path: ${{ env.PNPM_STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install pnpm packages 📦
        run: |
          pnpm install --frozen-lockfile

      - name: Typecheck (svelte-check) 🔍
        run: pnpm check

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup Node.js 🟢
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enable Corepack (pnpm) 🎯
        run: |
          corepack enable
          pnpm --version

      - name: Get pnpm store directory 📂
        run: echo "PNPM_STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_ENV"

      - name: Use cache for pnpm 🎁
        uses: actions/cache@v4
        with:
          path: ${{ env.PNPM_STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install pnpm packages 📦
        run: |
          pnpm install --frozen-lockfile

      # tsconfig.json extends ./.svelte-kit/tsconfig.json, which only exists after sync
      # (the check and build jobs run sync implicitly; bare vitest does not)
      - name: Generate .svelte-kit (svelte-kit sync) 🔄
        run: pnpm exec svelte-kit sync

      - name: Test (vitest) 🧪
        run: pnpm test

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      # Client bundling OOMs V8's default heap; build needs ~8GB (runners have 16GB).
      NODE_OPTIONS: --max-old-space-size=8192
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup Node.js 🟢
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enable Corepack (pnpm) 🎯
        run: |
          corepack enable
          pnpm --version

      - name: Get pnpm store directory 📂
        run: echo "PNPM_STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_ENV"

      - name: Use cache for pnpm 🎁
        uses: actions/cache@v4
        with:
          path: ${{ env.PNPM_STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install pnpm packages 📦
        run: |
          pnpm install --frozen-lockfile

      - name: Build (Cloudflare adapter, smoke test only) 🏗️
        run: pnpm build
