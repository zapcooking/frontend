name: Run checks

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Launched flags are pinned TRUE, pre-launch flags pinned FALSE — either
  # kind of stray flip (a rollback merged by accident, or a staging-only
  # change reaching main) must fail CI. Changing a flag deliberately means
  # updating its guard in the same PR.
  flag-guard:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: PASSKEY_SYNC_ENABLED must be true on main 🚫
        run: |
          if ! grep -q "export const PASSKEY_SYNC_ENABLED = true" src/lib/passkeySync.ts; then
            echo "::error file=src/lib/passkeySync.ts::PASSKEY_SYNC_ENABLED is not true."
            echo "Vault sync launched (July 2026). An un-flip silently dark-ships"
            echo "cross-device sign-in — if this is a deliberate rollback, update"
            echo "this guard in the same PR."
            exit 1
          fi

      - name: PASSKEY_SIGNUP_ENABLED must be true on main 🚫
        run: |
          if ! grep -q "export const PASSKEY_SIGNUP_ENABLED = true" src/lib/passkeySync.ts; then
            echo "::error file=src/lib/passkeySync.ts::PASSKEY_SIGNUP_ENABLED is not true."
            echo "Passkey-first signup launched with SYNC (R3: both flip together)."
            echo "An un-flip silently removes the Secure-your-account step — if this"
            echo "is a deliberate rollback, update this guard in the same PR."
            exit 1
          fi

      - name: NOTE_REVIEW_POST_ENABLED must be true on main 🚫
        run: |
          if ! grep -q "export const NOTE_REVIEW_POST_ENABLED = true" src/lib/noteReview.ts; then
            echo "::error file=src/lib/noteReview.ts::NOTE_REVIEW_POST_ENABLED is not true."
            echo "Posting launched in Phase 3 (flag flipped with the postComment"
            echo "wiring). An un-flip silently dark-ships the Post button — if you"
            echo "mean to kill the publish path, update this guard in the same PR."
            exit 1
          fi

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup Node.js 🟢
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enable Corepack (pnpm) 🎯
        run: |
          corepack enable
          pnpm --version

      - name: Get pnpm store directory 📂
        run: echo "PNPM_STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_ENV"

      - name: Use cache for pnpm 🎁
        uses: actions/cache@v4
        with:
          path: ${{ env.PNPM_STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install pnpm packages 📦
        run: |
          pnpm install --frozen-lockfile

      # Soft-fail: repo-wide formatting/eslint debt (563 prettier files, ~17k eslint errors).
      # Tracked for cleanup — flip to enforcing once formatting debt is paid.
      - name: Lint 🧹
        continue-on-error: true
        run: pnpm lint

  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup Node.js 🟢
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enable Corepack (pnpm) 🎯
        run: |
          corepack enable
          pnpm --version

      - name: Get pnpm store directory 📂
        run: echo "PNPM_STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_ENV"

      - name: Use cache for pnpm 🎁
        uses: actions/cache@v4
        with:
          path: ${{ env.PNPM_STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install pnpm packages 📦
        run: |
          pnpm install --frozen-lockfile

      - name: Typecheck (svelte-check) 🔍
        run: pnpm check

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup Node.js 🟢
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enable Corepack (pnpm) 🎯
        run: |
          corepack enable
          pnpm --version

      - name: Get pnpm store directory 📂
        run: echo "PNPM_STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_ENV"

      - name: Use cache for pnpm 🎁
        uses: actions/cache@v4
        with:
          path: ${{ env.PNPM_STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install pnpm packages 📦
        run: |
          pnpm install --frozen-lockfile

      # tsconfig.json extends ./.svelte-kit/tsconfig.json, which only exists after sync
      # (the check and build jobs run sync implicitly; bare vitest does not)
      - name: Generate .svelte-kit (svelte-kit sync) 🔄
        run: pnpm exec svelte-kit sync

      - name: Test (vitest) 🧪
        run: pnpm test

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      # Client bundling OOMs V8's default heap; build needs ~8GB (runners have 16GB).
      NODE_OPTIONS: --max-old-space-size=8192
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup Node.js 🟢
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enable Corepack (pnpm) 🎯
        run: |
          corepack enable
          pnpm --version

      - name: Get pnpm store directory 📂
        run: echo "PNPM_STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_ENV"

      - name: Use cache for pnpm 🎁
        uses: actions/cache@v4
        with:
          path: ${{ env.PNPM_STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install pnpm packages 📦
        run: |
          pnpm install --frozen-lockfile

      - name: Build (Cloudflare adapter, smoke test only) 🏗️
        run: pnpm build
